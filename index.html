<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinguaPath</title>
  <meta name="description" content="A beautiful, interactive 30-day language learning study plan." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- NAVBAR: brand | streak | lang select | back -->
  <nav class="navbar navbar-dark sticky-top" id="main-navbar">
    <div class="container-fluid px-3 px-md-4">

      <a class="navbar-brand d-flex align-items-center gap-2" href="#" id="nav-home-btn">
        <span class="brand-icon">🌍</span>
        <span class="brand-text">LinguaPath</span>
      </a>

      <div class="d-flex align-items-center gap-2 ms-auto">
        <i class="bi bi-translate" style="color:rgba(245,240,232,0.5);font-size:0.85rem;"></i>
        <select class="form-select form-select-sm lang-select" id="lang-select">
          <option value="spanish">🇪🇸 Spanish</option>
          <option value="german">🇩🇪 German</option>
          <option value="french">🇫🇷 French</option>
        </select>

        <button class="btn-back d-none" id="back-btn">
          <i class="bi bi-arrow-left me-1"></i>Back
        </button>
      </div>
    </div>
  </nav>

  <!-- PROGRESS STRIP: bar + fun fact (now below navbar) -->
  <div id="top-strip">
    <div id="strip-progress-row">
      <span class="strip-label">Progress</span>
      <div class="strip-track">
        <div class="strip-fill" id="progress-bar-fill"></div>
      </div>
      <span class="strip-count" id="progress-label">0 / 30</span>
    </div>
    <div id="strip-funfact-row">
      <span class="strip-fact-icon">💡</span>
      <span id="strip-funfact-text"><strong>Tip:</strong> Click any day card to start learning!</span>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="container-fluid px-3 px-md-4 py-4" id="main-content">

    <!-- ================================ -->
    <!-- DASHBOARD VIEW                   -->
    <!-- ================================ -->
    <div id="view-dashboard">
      <div class="row g-3" id="day-cards-grid">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- ================================ -->
    <!-- LESSON VIEW                      -->
    <!-- ================================ -->
    <div id="view-lesson" class="d-none">

      <div class="lesson-header mb-4">
        <div class="d-flex align-items-start justify-content-between flex-wrap gap-3">
          <div>
            <span class="lesson-day-badge" id="lesson-day-badge">Day 1</span>
            <h2 class="lesson-title mt-2" id="lesson-title"></h2>
            <p class="lesson-funfact" id="lesson-funfact"></p>
          </div>
          <button class="btn-complete" id="complete-btn">
            <i class="bi bi-check-circle me-2"></i>Mark Complete
          </button>
        </div>
      </div>

      <section class="lesson-section mb-3">
        <h4 class="section-heading"><i class="bi bi-book"></i>Grammar Concepts</h4>
        <div id="grammar-cards"></div>
      </section>

      <section class="lesson-section mb-3">
        <h4 class="section-heading"><i class="bi bi-pencil-square"></i>Practice Problems</h4>
        <div id="practice-problems"></div>
      </section>

      <section class="lesson-section mb-3">
        <h4 class="section-heading"><i class="bi bi-collection-play"></i>Study Materials</h4>
        <div class="row g-3" id="resource-links"></div>
      </section>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
